<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>SafeRoute</h1>
</body>
<script>
    async function cadastrarUsuario(nome, senha) {
        await fetch("cadastro.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nome: nome,
                senha: senha
            })
        })
        .then(response => response.json())
        .then(data => {console.log(data);})
    }
    async function loginUsuario(nome, senha) {
        await fetch("login.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nome: nome,
                senha: senha
            })
        })
        .then(response => response.json())
        .then(data => {console.log(data);})
    }
    loginUsuario("Victor", "123123");
</script>
</html>
